<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado del Pago — Taller Kappa</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="styles.css?v=20260511">
    <link rel="stylesheet" href="pages.css?v=20260511">
    <style>
        .result-page {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }
        .result-icon {
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 24px;
        }
        .result-icon.success { background: #e8f5e9; color: #2e7d32; }
        .result-icon.pending { background: #fff3e0; color: #ef6c00; }
        .result-icon.rejected { background: #fce4ec; color: #c62828; }
        .result-page h1 { margin-bottom: 12px; }
        .result-page p { color: #666; max-width: 500px; margin-bottom: 8px; }
        .result-order { font-family: monospace; background: #f5f5f5; padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; color: #888; margin: 16px 0; }
        .result-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 24px; }
    </style>
</head>
<body>
    <div class="result-page" id="result-page">
        <div class="result-icon" id="result-icon"><i class="fas fa-spinner fa-spin"></i></div>
        <h1 id="result-title">Procesando...</h1>
        <p id="result-msg">Verificando el estado de tu pago.</p>
        <div class="result-order" id="result-order" style="display:none;"></div>
        <div class="result-buttons" id="result-buttons"></div>
    </div>

    <script src="partials.js?v=20260511"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const orderId = params.get('order');

        const icon = document.getElementById('result-icon');
        const title = document.getElementById('result-title');
        const msg = document.getElementById('result-msg');
        const orderEl = document.getElementById('result-order');
        const btns = document.getElementById('result-buttons');

        // Clear cart
        sessionStorage.removeItem('kappa-cart');

        if (orderId) {
            orderEl.textContent = `Orden: #${orderId}`;
            orderEl.style.display = 'block';
        }

        if (status === 'approved') {
            icon.className = 'result-icon success';
            icon.innerHTML = '<i class="fas fa-check-circle"></i>';
            title.textContent = '¡Pago aprobado!';
            msg.textContent = 'Tu compra fue procesada correctamente. Te contactaremos para coordinar la entrega.';
            btns.innerHTML = `
                <a href="index.html" class="btn-main"><i class="fas fa-home" style="margin-right:8px;"></i> Ir al Inicio</a>
                <a href="https://wa.me/541161242498?text=Hola!+Mi+orden+es+%23${orderId}.+Quisiera+coordinar+la+entrega." target="_blank" class="btn-outline" style="border-color:var(--primary);color:var(--primary);">
                    <i class="fab fa-whatsapp" style="margin-right:8px;"></i> Coordinar entrega
                </a>`;
        } else if (status === 'pending') {
            icon.className = 'result-icon pending';
            icon.innerHTML = '<i class="fas fa-clock"></i>';
            title.textContent = 'Pago pendiente';
            msg.textContent = 'Tu pago está siendo procesado. Te notificaremos cuando se acredite.';
            btns.innerHTML = `<a href="index.html" class="btn-main"><i class="fas fa-home" style="margin-right:8px;"></i> Volver al Inicio</a>`;
        } else {
            icon.className = 'result-icon rejected';
            icon.innerHTML = '<i class="fas fa-times-circle"></i>';
            title.textContent = 'Pago rechazado';
            msg.textContent = 'No se pudo procesar tu pago. Podés intentar nuevamente o contactarnos por WhatsApp.';
            btns.innerHTML = `
                <a href="catalogo.html" class="btn-main"><i class="fas fa-redo" style="margin-right:8px;"></i> Intentar de nuevo</a>
                <a href="https://wa.me/541161242498" target="_blank" class="btn-outline" style="border-color:var(--primary);color:var(--primary);">
                    <i class="fab fa-whatsapp" style="margin-right:8px;"></i> Contactar
                </a>`;
        }
    </script>
</body>
</html>
