<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración — Taller Kappa</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --surface2: #252525;
            --accent: #b8860b;
            --accent-hover: #d4a017;
            --text: #eee;
            --text2: #aaa;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* LOGIN */
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-box { background: var(--surface); border-radius: 16px; padding: 50px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .login-box h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; color: var(--accent); }
        .login-box p { text-align: center; color: var(--text2); margin-bottom: 30px; font-size: 0.9rem; }
        .login-box .logo { text-align: center; font-size: 2.5rem; color: var(--accent); margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid #333; border-radius: 8px; color: var(--text); font-size: 1rem; transition: border 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .btn-login { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background: var(--accent-hover); }
        .login-error { color: var(--danger); text-align: center; margin-top: 15px; font-size: 0.9rem; display: none; }

        /* DASHBOARD */
        .dashboard { display: none; }
        .topbar { background: var(--surface); padding: 16px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .topbar h1 { font-size: 1.2rem; color: var(--accent); }
        .topbar .user-info { display: flex; align-items: center; gap: 15px; }
        .topbar .user-info span { color: var(--text2); font-size: 0.85rem; }
        .btn-logout { padding: 8px 16px; background: transparent; border: 1px solid #555; color: var(--text2); border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        .main-content { padding: 30px; max-width: 1200px; margin: 0 auto; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); border-radius: 12px; padding: 24px; text-align: center; }
        .stat-card .stat-icon { font-size: 1.8rem; margin-bottom: 10px; }
        .stat-card .stat-icon.success { color: var(--success); }
        .stat-card .stat-icon.warning { color: var(--warning); }
        .stat-card .stat-icon.info { color: var(--info); }
        .stat-card .stat-icon.accent { color: var(--accent); }
        .stat-card .stat-number { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .stat-card .stat-label { font-size: 0.8rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }

        /* FILTERS */
        .filters { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 8px 18px; background: var(--surface); border: 1px solid #333; border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(184,134,11,0.1); }
        .filters h3 { color: var(--text2); font-size: 0.85rem; margin-right: 10px; }

        /* ORDERS TABLE */
        .orders-section h2 { font-size: 1.3rem; margin-bottom: 20px; }
        .orders-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 12px; overflow: hidden; }
        .orders-table th { background: var(--surface2); padding: 14px 16px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); }
        .orders-table td { padding: 14px 16px; border-top: 1px solid #2a2a2a; font-size: 0.9rem; vertical-align: top; }
        .orders-table tr:hover td { background: rgba(184,134,11,0.03); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
        .badge-approved { background: rgba(39,174,96,0.15); color: var(--success); }
        .badge-pending { background: rgba(243,156,18,0.15); color: var(--warning); }
        .badge-rejected { background: rgba(231,76,60,0.15); color: var(--danger); }
        .badge-in_process { background: rgba(52,152,219,0.15); color: var(--info); }
        .badge-confirmed { background: rgba(39,174,96,0.3); color: #2ecc71; }

        .order-items { font-size: 0.82rem; color: var(--text2); }
        .order-items li { margin-bottom: 3px; list-style: none; }

        .btn-action { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.78rem; font-weight: 600; transition: opacity 0.3s; }
        .btn-action:hover { opacity: 0.8; }
        .btn-confirm { background: var(--success); color: #fff; }
        .btn-reject { background: var(--danger); color: #fff; margin-left: 5px; }
        .btn-notes { background: var(--surface2); color: var(--text2); border: 1px solid #444; margin-left: 5px; }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; color: #333; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-content { padding: 20px 15px; }
            .orders-table { font-size: 0.8rem; display: block; overflow-x: auto; }
            .topbar { padding: 12px 15px; }
            .login-box { padding: 30px 25px; }
        }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border-radius: 12px; padding: 30px; width: 90%; max-width: 500px; }
        .modal h3 { margin-bottom: 15px; color: var(--accent); }
        .modal textarea { width: 100%; height: 100px; background: var(--surface2); border: 1px solid #333; border-radius: 8px; padding: 12px; color: var(--text); font-size: 0.9rem; resize: vertical; }
        .modal textarea:focus { outline: none; border-color: var(--accent); }
        .modal-btns { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .modal-btns button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .modal-btns .btn-cancel { background: var(--surface2); color: var(--text2); }
        .modal-btns .btn-save { background: var(--accent); color: #000; }
        /* TABS */
        .admin-tabs { display: flex; gap: 0; border-bottom: 2px solid #2a2a2a; margin-bottom: 30px; }
        .admin-tab { padding: 12px 24px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: .9rem; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
        .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .admin-tab-panel { display: none; }
        .admin-tab-panel.active { display: block; }
    </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-container" id="loginScreen">
    <div class="login-box">
        <div class="logo"><i class="fas fa-lock"></i></div>
        <h1>Panel Admin</h1>
        <p>Taller Kappa — Gestión de Pedidos</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" placeholder="admin" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
        </form>
        <p class="login-error" id="loginError">Usuario o contraseña incorrectos</p>
    </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <div class="topbar">
        <h1><i class="fas fa-cogs"></i> Taller Kappa — Admin</h1>
        <div class="user-info">
            <span><i class="fas fa-user-shield"></i> <span id="adminName">admin</span></span>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
        </div>
    </div>

    <div class="main-content">
        <!-- STATS -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon info"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-number" id="statTotal">—</div>
                <div class="stat-label">Pedidos totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon success"><i class="fas fa-check-circle"></i></div>
                <div class="stat-number" id="statApproved">—</div>
                <div class="stat-label">Pagados</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon warning"><i class="fas fa-clock"></i></div>
                <div class="stat-number" id="statPending">—</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon accent"><i class="fas fa-dollar-sign"></i></div>
                <div class="stat-number" id="statRevenue">—</div>
                <div class="stat-label">Facturado</div>
            </div>
        </div>

        <!-- TABS -->
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="showTab('orders')"><i class="fas fa-list-alt"></i> Pedidos</button>
            <button class="admin-tab" onclick="showTab('users')"><i class="fas fa-users"></i> Clientes</button>
        </div>

        <!-- TAB: PEDIDOS -->
        <div class="admin-tab-panel active" id="tab-orders">
            <!-- FILTERS -->
            <div class="filters">
                <h3><i class="fas fa-filter"></i> Filtrar:</h3>
                <button class="filter-btn active" data-filter="">Todos</button>
                <button class="filter-btn" data-filter="approved">✅ Pagados</button>
                <button class="filter-btn" data-filter="pending">⏳ Pendientes</button>
                <button class="filter-btn" data-filter="confirmed">📦 Confirmados</button>
                <button class="filter-btn" data-filter="rejected">❌ Rechazados</button>
            </div>
            <div class="orders-section">
                <h2><i class="fas fa-list-alt"></i> Pedidos</h2>
                <div id="ordersContainer"></div>
            </div>
        </div>

        <!-- TAB: CLIENTES -->
        <div class="admin-tab-panel" id="tab-users">
            <div class="orders-section">
                <h2><i class="fas fa-users"></i> Clientes registrados</h2>
                <div id="usersContainer"></div>
            </div>
        </div>
    </div>
</div>

<!-- NOTES MODAL -->
<div class="modal-overlay" id="notesModal">
    <div class="modal">
        <h3><i class="fas fa-sticky-note"></i> Notas del pedido</h3>
        <textarea id="notesText" placeholder="Agregá notas internas sobre este pedido..."></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeNotesModal()">Cancelar</button>
            <button class="btn-save" onclick="saveNotes()">Guardar</button>
        </div>
    </div>
</div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? `http://localhost:3000`
    : 'https://taller-kappa-api.onrender.com';

let token = localStorage.getItem('admin_token');
let currentFilter = '';
let notesOrderId = null;

// Check if already logged in
if (token) showDashboard();

// LOGIN
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch(`${API}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
            token = data.token;
            localStorage.setItem('admin_token', token);
            showDashboard();
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    } catch (err) {
        document.getElementById('loginError').textContent = 'Error de conexión';
        document.getElementById('loginError').style.display = 'block';
    }
});

function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadOrders();
}

function logout() {
    localStorage.removeItem('admin_token');
    token = null;
    location.reload();
}

async function loadStats() {
    try {
        const res = await fetch(`${API}/api/admin/stats`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) return logout();
        const stats = await res.json();
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statApproved').textContent = stats.approved;
        document.getElementById('statPending').textContent = stats.pending;
        document.getElementById('statRevenue').textContent = '$' + stats.revenue.toLocaleString('es-AR');
    } catch (err) { console.error(err); }
}

async function loadOrders() {
    try {
        const url = currentFilter ? `${API}/api/admin/orders?status=${currentFilter}` : `${API}/api/admin/orders`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) return logout();
        const orders = await res.json();
        renderOrders(orders);
    } catch (err) { console.error(err); }
}

function renderOrders(orders) {
    const container = document.getElementById('ordersContainer');
    if (!orders.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>No hay pedidos con este filtro</p></div>`;
        return;
    }

    let html = `<table class="orders-table">
        <thead><tr>
            <th>Fecha</th>
            <th>Cliente</th>
            <th>Productos</th>
            <th>Total</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr></thead><tbody>`;

    for (const order of orders) {
        const date = new Date(order.createdAt).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit', hour: '2-digit', minute: '2-digit' });
        const buyer = order.buyer?.email || order.buyer?.name || 'Sin datos';
        const items = order.items.map(i => `<li>• ${i.qty}x ${i.name} (${i.color})</li>`).join('');
        const statusClass = `badge-${order.status}`;

        html += `<tr>
            <td>${date}</td>
            <td>${buyer}${order.buyer?.phone ? '<br><small>' + order.buyer.phone + '</small>' : ''}</td>
            <td><ul class="order-items">${items}</ul></td>
            <td><strong>$${order.total.toLocaleString('es-AR')}</strong></td>
            <td><span class="badge ${statusClass}">${translateStatus(order.status)}</span>
                ${order.adminNotes ? '<br><small style="color:#888;margin-top:4px;display:inline-block"><i class="fas fa-sticky-note"></i> ' + order.adminNotes + '</small>' : ''}
            </td>
            <td>
                ${order.status === 'approved' ? `<button class="btn-action btn-confirm" onclick="updateOrder('${order._id}','confirmed')"><i class="fas fa-check"></i> Confirmar</button>` : ''}
                ${order.status === 'pending' ? `<button class="btn-action btn-reject" onclick="updateOrder('${order._id}','rejected')"><i class="fas fa-times"></i> Rechazar</button>` : ''}
                <button class="btn-action btn-notes" onclick="openNotesModal('${order._id}','${(order.adminNotes||'').replace(/'/g,'')}')"><i class="fas fa-pen"></i></button>
            </td>
        </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

function translateStatus(s) {
    const map = { pending: 'Pendiente', approved: 'Pagado', rejected: 'Rechazado', in_process: 'En proceso', confirmed: 'Confirmado' };
    return map[s] || s;
}

async function updateOrder(id, status) {
    if (!confirm(`¿Cambiar estado a "${translateStatus(status)}"?`)) return;
    try {
        const res = await fetch(`${API}/api/admin/orders/${id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ status })
        });
        if (res.ok) { loadOrders(); loadStats(); }
    } catch (err) { alert('Error: ' + err.message); }
}

function openNotesModal(id, existing) {
    notesOrderId = id;
    document.getElementById('notesText').value = existing;
    document.getElementById('notesModal').classList.add('active');
}

function closeNotesModal() {
    document.getElementById('notesModal').classList.remove('active');
    notesOrderId = null;
}

async function saveNotes() {
    const notes = document.getElementById('notesText').value;
    try {
        await fetch(`${API}/api/admin/orders/${notesOrderId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ notes })
        });
        closeNotesModal();
        loadOrders();
    } catch (err) { alert('Error: ' + err.message); }
}

// FILTER BUTTONS
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        loadOrders();
    });
});

// TABS
function showTab(name) {
    document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('.admin-tab')[name === 'orders' ? 0 : 1].classList.add('active');
    if (name === 'users') loadUsers();
}

// USUARIOS
async function loadUsers() {
    try {
        const res = await fetch(`${API}/api/admin/users`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) return logout();
        const users = await res.json();
        renderUsers(users);
    } catch (err) { console.error(err); }
}

function renderUsers(users) {
    const container = document.getElementById('usersContainer');
    if (!users.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><p>No hay clientes registrados aún</p></div>`;
        return;
    }
    let html = `<table class="orders-table">
        <thead><tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Registrado</th>
            <th>Estado</th>
        </tr></thead><tbody>`;
    for (const u of users) {
        const date = new Date(u.createdAt).toLocaleDateString('es-AR');
        html += `<tr>
            <td><strong>${u.name}</strong></td>
            <td>${u.email}</td>
            <td>${u.phone || '—'}</td>
            <td>${date}</td>
            <td><span class="badge ${u.active ? 'badge-approved' : 'badge-rejected'}">${u.active ? 'Activo' : 'Suspendido'}</span></td>
        </tr>`;
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}
</script>
</body>
</html>
