<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Taller Kappa</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link rel="stylesheet" href="styles.css?v=20260511">
    <link rel="stylesheet" href="https://unpkg.com/splitting/dist/splitting.css"/>
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #b71c1c 60%, #7f0000 100%);
            color: white;
        }
        .error-page h1 {
            font-size: clamp(4rem, 10vw, 8rem);
            color: white;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .error-page h2 {
            color: white;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 20px;
            opacity: 0.85;
        }
        .error-page p {
            max-width: 500px;
            margin-bottom: 30px;
            opacity: 0.7;
            font-size: 1rem;
        }
        .error-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>La página que buscás no existe o fue movida. Pero no te preocupes, podés volver al inicio o ver nuestro catálogo.</p>
        <div class="error-buttons">
            <a href="index.html" class="btn-main">
                <i class="fas fa-home" style="margin-right:8px;"></i> Ir al Inicio
            </a>
            <a href="catalogo.html" class="btn-outline">
                <i class="fas fa-th-large" style="margin-right:8px;"></i> Ver Catálogo
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/splitting/dist/splitting.min.js"></script>
    <script src="js/animations.js" defer></script>

</html>
