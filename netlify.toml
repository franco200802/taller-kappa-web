[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# /api/checkout → Netlify Function
[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200

# Páginas no encontradas → 404.html
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache largo para assets versionados (CSS/JS con ?v=...)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache para imágenes
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
